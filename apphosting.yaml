# Firebase App Hosting Configuration File
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: PORT
    value: "8080"
  - variable: ENV
    value: "production"
  - variable: DATA_DIR
    value: "/tmp/chorus-repository"

version: '3.8'

services:
  chorus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - DATA_DIR=/app/data/repository
    volumes:
      - chorus-data:/app/data/repository
    restart: unless-stopped

volumes:
  chorus-data:
    driver: local

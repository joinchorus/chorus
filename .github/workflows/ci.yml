name: Chorus CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Go Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Verify Go Formatting & Vet
        run: |
          go vet ./...

      - name: Run Backend Tests (with Race Detector)
        run: |
          go test -v -race ./...

      - name: Build Server Binary
        run: |
          go build -o server ./cmd/server

  frontend-build:
    name: React Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd web
          npm ci

      - name: Build Frontend Assets
        run: |
          cd web
          npm run build

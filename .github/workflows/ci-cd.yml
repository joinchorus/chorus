name: Chorus Application CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Run Go Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Unit & Integration Tests
        run: go test -v ./...

  frontend-build:
    name: Build React SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install & Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

  docker-build:
    name: Build & Verify Docker Image
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Container
        run: docker build -t chorus-app .

  deploy-app-hosting:
    name: Deploy to Firebase App Hosting
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Firebase Secret
        id: check_secret
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHORUS }}
        run: |
          if [ -z "$SERVICE_ACCOUNT" ]; then
            echo "SECRET_EXISTS=false" >> $GITHUB_ENV
            echo "::warning ::FIREBASE_SERVICE_ACCOUNT_CHORUS secret is missing in GitHub repository secrets. Deployment skipped."
          else
            echo "SECRET_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Deploy to Firebase App Hosting
        if: env.SECRET_EXISTS == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHORUS }}'
          channelId: live
          projectId: chorus-chat-app
